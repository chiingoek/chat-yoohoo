<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YooHoo Chat | Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008cff;
            --primary-glow: rgba(0, 140, 255, 0.4);
            --mod: #00ead3;
            --bg: #050505;
            --surface: #111;
            --text: #e0e0e0;
            --sidebar-bg: #0a0a0a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            background-color: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #001a33 0%, #050505 100%);
        }
        #authOverlay, #kickOverlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: var(--surface); padding: 30px; border-radius: 20px;
            border: 1px solid var(--primary); box-shadow: 0 0 40px var(--primary-glow);
            width: 400px; text-align: center;
        }
        h1, h2 { letter-spacing: 5px; text-transform: uppercase; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #333; background: #0a0a0a; color: #fff; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn-main {
            background: var(--primary); color: white; width: 100%; padding: 12px;
            margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        header { height: 60px; background: rgba(17, 17, 17, 0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        main { display: flex; height: calc(100vh - 60px); }
        #sidebar { width: 300px; background: var(--sidebar-bg); border-right: 1px solid #222; padding: 15px; overflow-y: auto; }
        #chatArea { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chatContainer { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Bubbles */
        .message { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 0.9em; line-height: 1.4; cursor: pointer; transition: 0.2s; position: relative; }
        .message:hover { filter: brightness(1.2); }
        .msg-Member { background: #222; align-self: flex-start; border-left: 3px solid #444; }
        .msg-Moderator { background: #0a1f25; align-self: flex-start; border-left: 3px solid var(--mod); }
        .msg-Admin { background: #0a162b; align-self: flex-start; border-left: 3px solid var(--primary); }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; }
        
        /* Photo Styling */
        .photo-msg { max-width: 100%; border-radius: 8px; margin: 5px 0; display: block; border: 1px solid rgba(255,255,255,0.1); }
        #imagePreviewContainer { display: none; padding: 10px 20px; background: #111; border-top: 1px solid #222; align-items: center; gap: 15px; }
        #imagePreview { height: 50px; border-radius: 5px; border: 1px solid var(--primary); }

        /* Reactions */
        .reaction-drawer { 
            display: none; gap: 12px; background: #111; padding: 8px 15px; 
            border-radius: 30px; border: 1px solid var(--primary); position: absolute;
            top: -45px; left: 0; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .msg-me .reaction-drawer { left: auto; right: 0; }
        .message.active-react .reaction-drawer { display: flex; }
        .reaction { cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .reaction:hover { transform: scale(1.4); }
        .reaction-count-tag { font-size: 0.75em; background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 12px; margin-right: 5px; display: inline-flex; align-items: center; gap: 3px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }

        /* User List & Notifications */
        .user-row { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; position: relative; }
        .user-row:hover { border-color: var(--primary); }
        .mod-btn { font-size: 0.6em; padding: 4px 8px; margin-right: 4px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; color: white; }
        
        .notif-glow { 
            border-color: var(--primary) !important; 
            box-shadow: 0 0 15px var(--primary-glow); 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { border-color: var(--primary); } 50% { border-color: white; } 100% { border-color: var(--primary); } }
        
        #viewIndicator { font-size: 0.65em; color: var(--primary); letter-spacing: 2px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="card">
        <h1 id="authTitle">Login</h1>
        <input type="text" id="userIn" placeholder="Username">
        <input type="password" id="passIn" placeholder="Password">
        <button id="mainAuthBtn" class="btn-main">Login</button>
        <button id="toggleBtn" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:10px; font-size:0.8em; text-decoration:underline;">Need an account? Register</button>
    </div>
</div>

<div id="kickOverlay" style="display:none;">
    <div class="card">
        <h2 style="color:#ff4d4d;">Access Denied</h2>
        <p>Your account is currently suspended.</p>
        <button id="rejoinBtn" class="btn-main" onclick="requestRejoin()">Request Reactivation</button>
        <p id="requestStatus" style="font-size:0.8em; color:gray; margin-top:10px;"></p>
    </div>
</div>

<header>
    <h2 onclick="location.reload()" style="cursor:pointer">YOOHOO</h2>
    <div id="headerInfo" style="font-size:0.8em; opacity:0.8; color: var(--mod);"></div>
    <button onclick="location.reload()" style="background:none; color:#ff4d4d; border:1px solid #ff4d4d; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
</header>

<main>
    <div id="sidebar">
        <div id="viewIndicator">
            <span id="listTitle">ONLINE USERS</span>
            <button id="backToGlobal" style="display:none; background:var(--primary); border:none; color:white; font-size:10px; padding:3px 7px; cursor:pointer; border-radius:5px;" onclick="loadGlobalChat()">BACK TO GLOBAL</button>
        </div>
        <div id="userList"></div>
    </div>
    <div id="chatArea">
        <div id="chatContainer"></div>
        
        <div id="imagePreviewContainer">
            <img id="imagePreview" src="">
            <span id="fileName" style="font-size: 0.8em; color: gray; flex: 1;"></span>
            <button onclick="clearImage()" style="background:none; border:none; color:#ff4d4d; cursor:pointer;">✕</button>
        </div>

        <div id="inputArea" style="padding:15px 20px; background:#0f0f0f; display:flex; gap:10px; border-top:1px solid #222; align-items:center;">
            <label for="fileInput" style="cursor:pointer; font-size:1.5em; padding:0 5px;">📎</label>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="messageInput" placeholder="Message..." autocomplete="off" style="margin:0;">
            <button class="btn-main" style="width:80px; margin:0;" id="sendMsgBtn">Send</button>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
